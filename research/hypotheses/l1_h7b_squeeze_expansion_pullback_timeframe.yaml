hypothesis_id: "L1-H7B"
title: "Timeframe Robustness Study for Squeeze Expansion Pullback Continuation"
description: "Dedicated timeframe robustness study for L1-H7 squeeze-expansion-pullback continuation baseline."
research_layer: "L1"
hypothesis_family: "trend_continuation"
parent_family: "L1-H7"
version: "1.0.0"
author: "bulletproof_bt"
created_at: "2026-04-06T00:00:00Z"

required_indicators:
  - bb_kc_squeeze
  - bollinger
  - keltner
  - adx
  - ema
  - atr
  - session_vwap

indicator_defaults:
  squeeze_model: "bb_inside_kc"
  bb_period: 20
  bb_std_mult: 2.0
  kc_period: 20
  kc_atr_mult: 1.5
  squeeze_min_bars: 4
  ema_fast_period: 9
  ema_slow_period: 21
  pullback_ema_period: 21
  pullback_reference_logic: "ema21_or_session_vwap"

parameter_grid:
  signal_timeframe: ["5m", "15m", "1h"]
  adx_min: [18, 25]
  pullback_max_wait: [8, 12]
  partial_at_r: [1.5, 2.0]
  bb_period: [20]
  bb_std_mult: [2.0]
  kc_period: [20]
  kc_atr_mult: [1.5]
  squeeze_min_bars: [4]
  ema_fast_period: [9]
  ema_slow_period: [21]
  pullback_ema_period: [21]
  pullback_use_ema21: [true]
  pullback_use_session_vwap: [true]
  stop_atr_mult: [2.0]
  trail_atr_mult: [2.5]
  partial_fraction: [0.5]
  no_pyramiding: [true]
  family_variant: ["L1-H7B"]

entry:
  strategy: "l1_h7_squeeze_expansion_pullback"
  signal_timeframe: "15m"
  timeframe: "15m"
  base_execution_timeframe: "1m"
  order_timing: "bar_close_submit_next_bar_execution"
  no_pyramiding: true

exit:
  stop_kind: "atr_multiple"
  stop_model: "fixed_atr_multiple"
  stop_atr_mult: 2.0
  stop_update_policy: "frozen_at_entry"
  atr_source_timeframe: "signal_timeframe"
  partial_model: "partial_take_profit_then_protect_runner"
  partial_fraction: 0.5
  partial_at_r_param: "partial_at_r"
  protection_after_tp1: "break_even_or_better"
  runner_trail_model: "atr_multiple_after_tp1"
  trail_atr_mult: 2.5
  exit_monitoring_timeframe: "1m"

execution_semantics:
  signal_timeframe: "15m"
  base_execution_timeframe: "1m"
  exit_monitoring_timeframe: "1m"
  base_data_frequency_expected: "1m"
  strategy_family: "trend_continuation"
  family_pattern: "squeeze_expansion_pullback"
  parent_family: "L1-H7"
  stop_model: "fixed_atr_multiple"
  stop_update_policy: "frozen_at_entry"
  tp_update_policy: "tp1_then_protected_runner"
  hold_time_unit: "base_bars"
  atr_source_timeframe: "signal_timeframe"
  risk_accounting: "engine_canonical_R"
  no_pyramiding: true

strategy_params_fixed:
  bb_period: 20
  bb_std_mult: 2.0
  kc_period: 20
  kc_atr_mult: 1.5
  squeeze_min_bars: 4
  ema_fast_period: 9
  ema_slow_period: 21
  pullback_ema_period: 21
  pullback_use_ema21: true
  pullback_use_session_vwap: true
  stop_atr_mult: 2.0
  trail_atr_mult: 2.5
  partial_fraction: 0.5
  family_variant: "L1-H7B"

risk_controls:
  max_positions: 5
  forbid_adding_to_losers: true
  enforce_min_stop_distance: true

evaluation:
  required_tiers: ["Tier2", "Tier3"]

logging:
  schema_version: "1.0"
  required_fields:
    - run_id
    - hypothesis_id
    - tier
    - ev_r_gross
    - ev_r_net
    - status
    - squeeze_on
    - squeeze_duration
    - squeeze_state
    - expansion_trigger_state
    - breakout_direction
    - directional_bias
    - adx
    - ema_fast
    - ema_slow
    - session_vwap
    - pullback_hit_ema21
    - pullback_hit_session_vwap
    - pullback_max_wait
    - partial_at_r
    - stop_details
    - stop_distance
    - entry_reference_price
    - signal_timeframe
    - exit_monitoring_timeframe
    - family_variant
    - tp1_hit
    - protection_activated

runtime_controls:
  enabled: true
